name: wildfire-gnn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ─────────────────────────────────────────────────────────────────
  - python=3.10.14

  # ── PyTorch (CUDA 11.8 — change cu118 → cpu if no GPU) ────────────────────
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=11.8

  # ── Geospatial ─────────────────────────────────────────────────────────────
  - rasterio=1.3.9
  - geopandas=0.14.3
  - fiona=1.9.5
  - pyproj=3.6.1
  - shapely=2.0.3
  - gdal=3.8.4

  # ── Scientific core ────────────────────────────────────────────────────────
  - numpy=1.26.4
  - scipy=1.12.0
  - scikit-learn=1.4.2
  - pandas=2.2.1

  # ── Visualization ──────────────────────────────────────────────────────────
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - cartopy=0.22.0

  # ── Dev tooling ────────────────────────────────────────────────────────────
  - jupyter=1.0.0
  - jupyterlab=4.1.5
  - ipykernel=6.29.3
  - pip=24.0
  - setuptools


  - pip:
  # ── PyTorch Geometric (must come after torch) ──────────────────────────
  # - torch-geometric==2.5.2
  # - torch-scatter==2.1.2+pt21cu118
  #- torch-sparse==0.6.18+pt21cu118
  # - torch-cluster==1.6.3+pt21cu118
  # - torch-spline-conv==1.2.2+pt21cu118

    # ── Gradient boosting baselines ───────────────────────────────────────
    - xgboost==2.0.3
    - lightgbm==4.3.0

    # ── Calibration ───────────────────────────────────────────────────────
    - netcal==1.3.5

    # ── ML experiment tracking ────────────────────────────────────────────
    - mlflow==2.11.3
    - wandb==0.16.6

    # ── Config management ─────────────────────────────────────────────────
    - pyyaml==6.0.1
    - omegaconf==2.3.0

    # ── Code quality ─────────────────────────────────────────────────────
    - black==24.3.0
    - ruff==0.3.5
    - mypy==1.9.0
    - pytest==8.1.1
    - pytest-cov==5.0.0

    # ── Utilities ────────────────────────────────────────────────────────
    - tqdm==4.66.2
    - rich==13.7.1
    - python-dotenv==1.0.1
    - pyarrow==15.0.2