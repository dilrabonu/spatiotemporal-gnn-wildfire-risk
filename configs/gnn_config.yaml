# ── IMPROVED VERSION — Phase 5A improvements applied ─────────────────────
# Changes from original:
#   model.in_channels: 63  (was 61 — added pos_row + pos_col)
#   model.architecture: GraphSAGE  (strongest architecture from Phase 5A)
#   model.num_layers: 2  (memory safe on Windows CPU)
#   training.patience: 25  (was 15 — gives model more time to converge)
#   training.min_delta: 0.00001  (was 0.0001 — finer stopping criterion)
#   training.epochs: 300  (was 200)
#   training.neighbors: [15, 10]  (was [10,5] — more spatial context)
#   training.weight_power: 1.5  (for weighted MSE loss)
#   uncertainty.loss_function: weighted_mse  (was mse)

paths:
  raw_dir:              data/raw/FSim_Dataset_Greece_raw_files
  burn_prob:            data/raw/FSim_Dataset_Greece_raw_files/Burn_Prob.img
  cfl:                  data/raw/FSim_Dataset_Greece_raw_files/CFL.img
  fsp_index:            data/raw/FSim_Dataset_Greece_raw_files/FSP_Index.img
  fuel_models:          data/raw/FSim_Dataset_Greece_raw_files/Fuel_Models.img
  ignition_prob:        data/raw/FSim_Dataset_Greece_raw_files/Ignition_Prob.img
  struct_exp_index:     data/raw/FSim_Dataset_Greece_raw_files/Struct_Exp_Index.img
  dem:                  data/external/dem_greece.tif

  aligned_dir:          data/interim/aligned
  baseline_csv:         data/processed/baseline_dataset.csv
  graph_data:           data/processed/graph_data_enriched.pt
  graph_data_legacy:    data/processed/graph_data_legacy_7f.pt

  features_dir:         data/features
  feature_names:        data/features/feature_names.json
  spatial_split_path:   data/features/splits_enriched.npz
  target_transformer:   data/features/target_transformer.pkl
  valid_cell_mask:      data/features/valid_cell_mask.npy

  figures_dir:          reports/figures
  tables_dir:           reports/tables

raster:
  reference_layer:      Burn_Prob
  crs:                  EPSG:2100
  nodata_float:         -3.4028235e+38
  nodata_uint8:         255
  resample_method:      bilinear
  resample_method_cat:  nearest

phase2_confirmed:
  total_raster_cells:   57395335
  valid_cells_full:     11789754
  valid_pct:            20.54
  nodata_cells:         45605581
  burn_prob_mean:       0.024167
  burn_prob_median:     0.012084
  burn_prob_std:        0.032834
  burn_prob_skewness:   2.593
  burn_prob_min:        0.000004
  burn_prob_max:        0.250882
  transformer_mean:    -0.0012
  transformer_std:      1.0119

graph:
  sampling_strategy:    spatial_grid
  sample_stride:        6
  n_nodes_full:         11789754
  n_nodes:              300000
  connectivity:         8
  node_features:        63      # 61 original + 2 positional (pos_row, pos_col)
  node_features_no_dem: 58      # 56 + 2 positional
  feature_groups:
    base_rasters:       [CFL, FSP_Index, Ignition_Prob, Struct_Exp_Index]
    dem_terrain:        [dem_elevation_m, dem_slope_deg, dem_aspect_sin, dem_aspect_cos, dem_twi]
    fuel_onehot:        true
    interactions:       true
    multiscale_stats:   [3, 7, 15]
    spatial_gradients:  true
    degree_feature:     false
    positional_encoding: true   # NEW: pos_row_norm, pos_col_norm

split:
  method:               geographic_block
  axis:                 row
  train_rows:           [0, 4200]
  val_rows:             [4201, 4800]
  test_rows:            [4801, 7596]
  train_n:              237304
  val_n:                32570
  test_n:               57531

target:
  column:               Burn_Prob
  transform:            quantile_normal

feature_engineering:
  add_degree_feature:         false
  add_neighborhood_features:  false
  neighborhood_aggs:          [mean, std, max]

# ── MODEL ──────────────────────────────────────────────────────────────────
# Start with GraphSAGE (best Phase 5A result: R²=0.397)
# Change architecture to GAT or GCN for ablation runs
model:
  architecture:         GraphSAGE   # GAT | GCN | GraphSAGE
  in_channels:          63          # 61 + pos_row + pos_col
  hidden_channels:      256
  out_channels:         2           # mean + log_variance (Gaussian NLL head)
  num_layers:           2           # memory safe on Windows CPU
  heads:                8           # GAT only
  dropout:              0.25        # slightly lower for GraphSAGE
  residual:             true
  batch_norm:           true

uncertainty:
  mc_samples:           30
  loss_function:        weighted_mse   # weighted_mse | mse | gaussian_nll
  calibration_method:   temperature_scaling
  ece_n_bins:           15
  target_ece:           0.05

# ── TRAINING ───────────────────────────────────────────────────────────────
training:
  stage:                stage1
  epochs:               300           # was 200 — more time to converge
  lr:                   0.001
  weight_decay:         1.0e-5
  batch_size:           1024
  neighbors:            [15, 10]      # was [10,5] — more spatial context
  patience:             25            # was 15 — allow slow convergence
  min_delta:            0.00001       # was 0.0001 — finer stopping criterion
  weight_power:         1.5           # for weighted_mse loss
  scheduler:            cosine
  scheduler_T_max:      300
  gradient_clip:        1.0
  seed:                 42

evaluation:
  metrics:              [r2, mae, spearman, ece, brier]
  binned_by_quantile:   true
  n_quantile_bins:      5
  inverse_transform:    true

intervention:
  scenarios:
    - name:   fuel_reduction_30pct
      feature: CFL
      delta:  -0.30
      region: null
    - name:   firebreak_strip
      feature: CFL
      delta:  -1.0
      region: [800, 900, 0, 7554]
    - name:   ignition_suppression
      feature: Ignition_Prob
      delta:  -0.50
      region: null
  mc_samples:           30

logging:
  use_mlflow:           false
  mlflow_tracking_uri:  mlruns/
  experiment_name:      wildfire-gnn
  log_every_n_epochs:   10
  save_best_model:      true
  best_model_metric:    val_loss